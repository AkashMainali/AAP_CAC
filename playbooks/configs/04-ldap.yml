---
controller_settings:
  # The LDAP Server URL
  AUTH_LDAP_SERVER_URI: "ldaps://ldap.example.com:636"

  # The User to bind as to perform searches
  AUTH_LDAP_BIND_DN: "cn=aap_svc,ou=ServiceAccounts,dc=example,dc=com"
  AUTH_LDAP_BIND_PASSWORD: "YourSecurePassword" # Use Ansible Vault here

  # User Search Configuration
  # Example: Look for users in the 'Users' OU where 'sAMAccountName' matches the login
  AUTH_LDAP_USER_SEARCH:
    - "ou=Users,dc=example,dc=com"
    - "SCOPE_SUBTREE"
    - "(sAMAccountName=%(user)s)"

  # Group Search Configuration
  AUTH_LDAP_GROUP_SEARCH:
    - "ou=Groups,dc=example,dc=com"
    - "SCOPE_SUBTREE"
    - "(objectClass=group)"

  # Mapping LDAP attributes to AAP User Profile
  AUTH_LDAP_USER_ATTR_MAP:
    first_name: "givenName"
    last_name: "sn"
    email: "mail"

  # User Type: Usually 'MemberDNGroupType' for Active Directory
  AUTH_LDAP_GROUP_TYPE: "MemberDNGroupType"

  # REQUIRED: Map LDAP Groups to AAP Organizations and Teams
  # This automatically places users in the RHEL or Windows Orgs you created
  AUTH_LDAP_TEAM_MAP:
    "RHEL-admin":
      organization: "RHEL"
      users: "cn=Linux_Admins,ou=Groups,dc=example,dc=com"
    "Windows-Admin":
      organization: "Windows"
      users: "cn=Windows_Admins,ou=Groups,dc=example,dc=com"