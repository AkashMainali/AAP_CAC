---
- name: Extract Credentials and RBAC Report
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - vars/api_vars.yml
  vars:
    report_path: "reports/05-credentials-report.yml"

  tasks:
    - name: Fetch all Credentials
      ansible.builtin.uri:
        url: "{{ aap_api_url }}/credentials/?page_size=200"
        method: GET
        user: "{{ aap_user }}"
        password: "{{ aap_pass }}"
        force_basic_auth: true
        validate_certs: false
      register: creds_response

    - name: Fetch RBAC Assignments
      ansible.builtin.uri:
        url: "{{ aap_api_url }}/role_team_assignments/?page_size=200"
        method: GET
        user: "{{ aap_user }}"
        password: "{{ aap_pass }}"
        force_basic_auth: true
        validate_certs: false
      register: rbac_response

    - name: Generate the YAML report structure
      ansible.builtin.set_fact:
        # 1. Process Main Credentials
        cred_list: |
          {% set clean_creds = [] %}
          {% for c in creds_response.json.results %}
          {%   set _ = clean_creds.append({
                 'name': c.name,
                 'organization': c.summary_fields.organization.name | default('Default'),
                 'credential_type': c.summary_fields.credential_type.name,
                 'inputs': {
                   'username': c.inputs.username | default('N/A'),
                   'password': 'REPLACE_ME_WITH_HASH'
                 }
               }) %}
          {% endfor %}
          {{ clean_creds }}

        # 2. Process RBAC (Expanded and Object-Level)
        rbac_list: |
          {% set clean_rbac = [] %}
          {% for r in rbac_response.json.results %}
            {% if r.content_type == 'shared.organization' and 'Credential' in r.summary_fields.role_definition.name %}
              {% for c in creds_response.json.results %}
                {% if c.summary_fields.organization.name | default('') == r.summary_fields.content_object.name %}
                  {% set _ = clean_rbac.append({
                    'team': r.summary_fields.team.name,
                    'credential': c.name,
                    'role': 'admin' if 'Admin' in r.summary_fields.role_definition.name else 'use'
                  }) %}
                {% endif %}
              {% endfor %}
            {% elif r.content_type == 'awx.credential' or r.content_type == 'credential' %}
              {% set _ = clean_rbac.append({
                'team': r.summary_fields.team.name,
                'credential': r.summary_fields.content_object.name,
                'role': 'admin' if 'Admin' in r.summary_fields.role_definition.name else 'use'
              }) %}
            {% endif %}
          {% endfor %}
          {{ clean_rbac | unique | list }}

    - name: Write report to credentials-report.yml
      ansible.builtin.copy:
        content: |
          ---
          # AAP Credentials & RBAC Export - Generated on {{ now().strftime('%Y-%m-%d') }}

          controller_credentials:
          {{ (cred_list | from_yaml) | to_nice_yaml(indent=2) | indent(2, True) | replace('REPLACE_ME_WITH_HASH', '# Password Here') }}

          controller_roles:
          {{ (rbac_list | from_yaml) | to_nice_yaml(indent=2) | indent(2, True) }}
        dest: "{{ report_path }}"
        mode: '0644'