---
- name: Extract Inventories, Hosts, and RBAC Report
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - vars/api_vars.yml
  vars:
    report_path: "reports/07-inventory-host-report.yml"

  tasks:
    - name: Fetch all Inventories
      ansible.builtin.uri:
        url: "{{ aap_api_url }}/inventories/?page_size=200"
        method: GET
        user: "{{ aap_user }}"
        password: "{{ aap_pass }}"
        force_basic_auth: true
        validate_certs: false
      register: inv_response

    - name: Fetch all Hosts
      ansible.builtin.uri:
        url: "{{ aap_api_url }}/hosts/?page_size=200"
        method: GET
        user: "{{ aap_user }}"
        password: "{{ aap_pass }}"
        force_basic_auth: true
        validate_certs: false
      register: host_response

    - name: Fetch RBAC Assignments
      ansible.builtin.uri:
        url: "{{ aap_api_url }}/role_team_assignments/?page_size=200"
        method: GET
        user: "{{ aap_user }}"
        password: "{{ aap_pass }}"
        force_basic_auth: true
        validate_certs: false
      register: rbac_response

    - name: Generate the YAML report structure
      ansible.builtin.set_fact:
        # 1. Process Inventories
        inv_list: |
          {% set clean_inv = [] %}
          {% for i in inv_response.json.results %}
          {%   set _ = clean_inv.append({
                 'name': i.name,
                 'organization': i.summary_fields.organization.name | default('Default'),
                 'description': i.description | default(''),
                 'variables': i.variables | from_yaml | default({})
               }) %}
          {% endfor %}
          {{ clean_inv }}

        # 2. Process Hosts (Mapping them to Inventory names)
        host_list: |
          {% set clean_hosts = [] %}
          {% for h in host_response.json.results %}
          {%   set _ = clean_hosts.append({
                 'name': h.name,
                 'inventory': h.summary_fields.inventory.name,
                 'variables': h.variables | from_yaml | default({})
               }) %}
          {% endfor %}
          {{ clean_hosts }}

        # 3. Process RBAC (Expanded for Inventories)
        rbac_list: |
          {% set clean_rbac = [] %}
          {% for r in rbac_response.json.results %}
            {% if r.content_type == 'shared.organization' and 'Inventory' in r.summary_fields.role_definition.name %}
              {% for i in inv_response.json.results %}
                {% if i.summary_fields.organization.name | default('') == r.summary_fields.content_object.name %}
                  {% set _ = clean_rbac.append({
                    'team': r.summary_fields.team.name,
                    'inventory': i.name,
                    'role': 'admin' if 'Admin' in r.summary_fields.role_definition.name else 'use'
                  }) %}
                {% endif %}
              {% endfor %}
            {% elif r.content_type == 'awx.inventory' %}
              {% set _ = clean_rbac.append({
                'team': r.summary_fields.team.name,
                'inventory': r.summary_fields.content_object.name,
                'role': 'admin' if 'Admin' in r.summary_fields.role_definition.name else 'use'
              }) %}
            {% endif %}
          {% endfor %}
          {{ clean_rbac | unique | list }}

    - name: Write report to inventory-report.yml
      ansible.builtin.copy:
        content: |
          ---
          # AAP Inventory & Hosts Export - Generated on {{ now().strftime('%Y-%m-%d') }}

          controller_inventories:
          {{ (inv_list | from_yaml) | to_nice_yaml(indent=2) | indent(2, True) }}

          controller_hosts:
          {{ (host_list | from_yaml) | to_nice_yaml(indent=2) | indent(2, True) }}

          controller_roles:
          {{ (rbac_list | from_yaml) | to_nice_yaml(indent=2) | indent(2, True) }}
        dest: "{{ report_path }}"
        mode: '0644'