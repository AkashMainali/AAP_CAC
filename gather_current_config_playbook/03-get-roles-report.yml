---
- name: Extract Team-Organization Roles Report
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - vars/api_vars.yml
  vars:
    report_path: "reports/03-roles-report.yml"

  tasks:
    - name: Ensure reports directory exists
      ansible.builtin.file:
        path: "reports"
        state: directory
        mode: '0755'

    - name: Fetch all Role Assignments
      ansible.builtin.uri:
        url: "{{ aap_api_url }}/role_team_assignments/?page_size=200"
        method: GET
        user: "{{ aap_user }}"
        password: "{{ aap_pass }}"
        force_basic_auth: true
        validate_certs: false
      register: roles_response

    - name: Generate the YAML report structure
      ansible.builtin.set_fact:
        roles_list: |
          {% set clean_list = [] %}
          {% for item in roles_response.json.results %}
          {# Check if the assignment is to an Organization (shared.organization) #}
          {%   if item.content_type == 'shared.organization' %}
          {%     set _ = clean_list.append({
                   'team': item.summary_fields.team.name,
                   'organization': item.summary_fields.content_object.name,
                   'role': item.summary_fields.role_definition.name
                 }) %}
          {%   endif %}
          {% endfor %}
          {{ clean_list }}

    - name: Write report to roles-report.yml
      ansible.builtin.copy:
        content: |
          ---
          # AAP Roles Export - Generated on {{ now().strftime('%Y-%m-%d') }}
          controller_roles:
          {{ roles_list | to_nice_yaml(indent=2) | indent(2, True) }}
        dest: "{{ report_path }}"
        mode: '0644'